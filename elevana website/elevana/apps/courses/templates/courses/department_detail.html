{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1>{{ department.name }}</h1>
    <p>{{ department.description }}</p>
    
    <div class="row">
        {% for course in courses %}
        <div class="col-md-4">
            <div class="card">
                <h3>{{ course.title }}</h3>
                <a href="{% url 'course_detail' course.slug %}" class="btn">View Course</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
